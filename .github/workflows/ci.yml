name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: Smoke import
        run: node -e "const r = require('./'); if (typeof r !== 'function') process.exit(1); console.log('ok', Object.keys(r).join(','))"

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Strict-TS validation of index.d.ts
        run: |
          npm install --no-save --silent typescript@5 @types/node@20
          ./node_modules/.bin/tsc --project test/types/tsconfig.json
